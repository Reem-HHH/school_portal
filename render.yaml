services:
  - type: web
    name: school-portal
    runtime: node
    runtimeVersion: "20"
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@school.com
      - key: ADMIN_PASSWORD
        value: admin123
      - key: SEED_DEMO_DATA
        value: "false"
      - key: DATABASE_URL
        sync: false
