services:
  - type: web
    name: school-portal
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /login.html
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@school.com
      - key: ADMIN_PASSWORD
        generateValue: true
    disk:
      name: school-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
