<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Digital School</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div id="toast-container"></div>

  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500 to-cyan-400 text-white shadow-lg mb-4">
        <i data-lucide="sparkles" class="w-8 h-8"></i>
      </div>
      <h1 class="text-2xl font-bold text-gray-800" data-i18n="login-title">Welcome Back</h1>
      <p class="text-gray-500 mt-1" data-i18n="login-sub">Sign in to your school portal account</p>
    </div>

    <div class="auth-card rounded-3xl shadow-xl p-8">
      <form id="login-form" class="space-y-5">
        <div>
          <label for="email" class="block text-sm font-semibold text-gray-700 mb-2" data-i18n="email-label">Email Address</label>
          <input id="email" type="email" required autocomplete="email"
            class="input-field w-full rounded-xl px-4 py-3 text-sm" placeholder="you@school.com">
        </div>
        <div>
          <label for="password" class="block text-sm font-semibold text-gray-700 mb-2" data-i18n="password-label">Password</label>
          <input id="password" type="password" required autocomplete="current-password"
            class="input-field w-full rounded-xl px-4 py-3 text-sm" placeholder="••••••••">
        </div>
        <button type="submit" id="login-btn"
          class="btn-primary w-full py-3 rounded-xl text-white font-bold text-sm">
          <span data-i18n="login-btn">Sign In</span>
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        <span data-i18n="no-account">Don't have an account?</span>
        <a href="/register.html" class="text-indigo-600 font-semibold hover:underline ml-1" data-i18n="register-link">Register here</a>
      </p>
    </div>

    <div class="text-center mt-6">
      <button id="lang-toggle" class="text-sm text-gray-500 hover:text-indigo-600 font-medium">العربية</button>
    </div>

    <div class="mt-6 p-4 rounded-2xl bg-white/60 border border-indigo-100 text-xs text-gray-500">
      <p class="font-semibold text-gray-700 mb-1">Demo accounts</p>
      <p>Admin: admin@school.com / admin123</p>
      <p>Teacher: teacher@school.com / teacher123</p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/i18n.js"></script>
  <script>
    lucide.createIcons();
    initLanguageToggle();
    redirectIfAuthed();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.disabled = true;

      try {
        const { user } = await API.post('/api/auth/login', {
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        });
        showToast(`Welcome, ${user.full_name}!`);
        setTimeout(() => { window.location.href = '/index.html'; }, 400);
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
