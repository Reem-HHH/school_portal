<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — School Portal</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-box">
      <h1 data-i18n="login">Sign in</h1>
      <p class="muted" style="margin-bottom:1.5rem">admin@school.com / admin123</p>

      <form id="login-form" class="card">
        <div class="form-row">
          <label for="email" data-i18n="email">Email</label>
          <input id="email" type="email" required autocomplete="email">
        </div>
        <div class="form-row">
          <label for="password" data-i18n="password">Password</label>
          <input id="password" type="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn" data-i18n="signIn">Sign in</button>
      </form>

      <p class="muted" style="margin-top:1rem">
        <span data-i18n="noAccount">No account?</span>
        <a href="/register.html" data-i18n="register">Register</a>
      </p>
      <p style="margin-top:0.75rem"><button id="lang-toggle" class="btn btn-outline">AR</button></p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/i18n.js"></script>
  <script>
    initLanguageToggle();
    redirectIfAuthed();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        await API.post('/api/auth/login', {
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        });
        window.location.href = '/index.html';
      } catch (err) {
        showToast(err.message, 'error');
      }
    });
  </script>
</body>
</html>
