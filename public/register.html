<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — School Portal</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-box">
      <h1 data-i18n="register">Register</h1>
      <p class="muted" style="margin-bottom:1.5rem">Parent or student accounts only.</p>

      <form id="register-form" class="card">
        <div class="form-row">
          <label for="fullName" data-i18n="name">Full name</label>
          <input id="fullName" type="text" required>
        </div>
        <div class="form-row">
          <label for="email" data-i18n="email">Email</label>
          <input id="email" type="email" required>
        </div>
        <div class="form-row">
          <label for="password" data-i18n="password">Password</label>
          <input id="password" type="password" required minlength="6">
        </div>
        <div class="form-row">
          <label for="role" data-i18n="role">Role</label>
          <select id="role">
            <option value="parent">Parent</option>
            <option value="student">Student</option>
          </select>
        </div>
        <button type="submit" class="btn" data-i18n="createAccount">Create account</button>
      </form>

      <p class="muted" style="margin-top:1rem">
        <span data-i18n="hasAccount">Have an account?</span>
        <a href="/login.html" data-i18n="login">Sign in</a>
      </p>
      <p style="margin-top:0.75rem"><button id="lang-toggle" class="btn btn-outline">AR</button></p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/i18n.js"></script>
  <script>
    initLanguageToggle();
    redirectIfAuthed();

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        await API.post('/api/auth/register', {
          fullName: document.getElementById('fullName').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
          role: document.getElementById('role').value
        });
        window.location.href = '/index.html';
      } catch (err) {
        showToast(err.message, 'error');
      }
    });
  </script>
</body>
</html>
