<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Digital School</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div id="toast-container"></div>

  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500 to-cyan-400 text-white shadow-lg mb-4">
        <i data-lucide="user-plus" class="w-8 h-8"></i>
      </div>
      <h1 class="text-2xl font-bold text-gray-800" data-i18n="register-title">Create Account</h1>
      <p class="text-gray-500 mt-1" data-i18n="register-sub">Join the digital school community</p>
    </div>

    <div class="auth-card rounded-3xl shadow-xl p-8">
      <form id="register-form" class="space-y-5">
        <div>
          <label for="fullName" class="block text-sm font-semibold text-gray-700 mb-2" data-i18n="name-label">Full Name</label>
          <input id="fullName" type="text" required
            class="input-field w-full rounded-xl px-4 py-3 text-sm" placeholder="Your full name">
        </div>
        <div>
          <label for="email" class="block text-sm font-semibold text-gray-700 mb-2" data-i18n="email-label">Email Address</label>
          <input id="email" type="email" required autocomplete="email"
            class="input-field w-full rounded-xl px-4 py-3 text-sm" placeholder="you@email.com">
        </div>
        <div>
          <label for="password" class="block text-sm font-semibold text-gray-700 mb-2" data-i18n="password-label">Password</label>
          <input id="password" type="password" required minlength="6" autocomplete="new-password"
            class="input-field w-full rounded-xl px-4 py-3 text-sm" placeholder="At least 6 characters">
        </div>
        <div>
          <label for="role" class="block text-sm font-semibold text-gray-700 mb-2" data-i18n="role-label">Account Type</label>
          <select id="role" required class="input-field w-full rounded-xl px-4 py-3 text-sm">
            <option value="parent">👪 Parent</option>
            <option value="student">🎓 Student</option>
          </select>
        </div>
        <button type="submit" id="register-btn"
          class="btn-primary w-full py-3 rounded-xl text-white font-bold text-sm">
          <span data-i18n="register-btn">Create Account</span>
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        <span data-i18n="has-account">Already have an account?</span>
        <a href="/login.html" class="text-indigo-600 font-semibold hover:underline ml-1" data-i18n="login-link">Sign in</a>
      </p>
    </div>

    <div class="text-center mt-6">
      <button id="lang-toggle" class="text-sm text-gray-500 hover:text-indigo-600 font-medium">العربية</button>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/i18n.js"></script>
  <script>
    lucide.createIcons();
    initLanguageToggle();
    redirectIfAuthed();

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('register-btn');
      btn.disabled = true;

      try {
        const { user } = await API.post('/api/auth/register', {
          fullName: document.getElementById('fullName').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
          role: document.getElementById('role').value
        });
        showToast(`Account created! Welcome, ${user.full_name}`);
        setTimeout(() => { window.location.href = '/index.html'; }, 400);
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
