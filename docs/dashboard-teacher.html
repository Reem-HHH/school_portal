<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="api-base" content="">
  <title>Teacher Dashboard — School Portal</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="dashboard-teacher.html" class="logo" data-i18n="teacherDashboard">Teacher Dashboard</a>
      <nav class="nav">
        <span id="user-label" class="muted"></span>
        <button id="lang-toggle" class="btn btn-outline">AR</button>
        <button id="logout-btn" data-i18n="logout">Logout</button>
      </nav>
    </div>
  </header>

  <main class="layout">
    <div class="tabs">
      <button class="tab active" data-tab="gradebook" data-i18n="tabGradebook">Gradebook</button>
      <button class="tab" data-tab="schedule" data-i18n="tabSchedule">My Schedule</button>
      <button class="tab" data-tab="data" data-i18n="tabSampleData">Sample Data</button>
    </div>

    <div id="panel-gradebook" class="tab-panel">
      <h2 data-i18n="formativeGradebook">Formative assessment gradebook</h2>
      <div class="card form-grid form-grid-3" style="margin-bottom:1rem">
        <div class="form-row">
          <label data-i18n="class">Class</label>
          <select id="class-select"></select>
        </div>
        <div class="form-row">
          <label data-i18n="assessmentType">Assessment type</label>
          <select id="assessment-type">
            <option value="quiz" data-i18n="quiz">Quiz</option>
            <option value="exam" data-i18n="exam">Exam</option>
            <option value="assignment" data-i18n="assignment">Assignment</option>
          </select>
        </div>
        <div class="form-row">
          <label data-i18n="assessmentName">Assessment name</label>
          <input id="assessment-name" data-i18n-placeholder="assessmentName" placeholder="Quiz 1" required>
        </div>
      </div>
      <div class="data-table-wrap">
        <table>
          <thead><tr>
            <th data-i18n="student">Student</th>
            <th data-i18n="score">Score</th>
            <th data-i18n="outOf">Out of</th>
          </tr></thead>
          <tbody id="gradebook-body"></tbody>
        </table>
      </div>
      <div style="margin-top:1rem;display:flex;gap:0.75rem;flex-wrap:wrap">
        <button id="save-grades-btn" class="btn" data-i18n="saveGrades">Save grades</button>
        <button id="download-gradebook-btn" class="btn btn-outline" data-i18n="downloadGradebook">Download gradebook (CSV)</button>
      </div>
    </div>

    <div id="panel-schedule" class="tab-panel section-hidden">
      <h2 data-i18n="mySchedule">My schedule</h2>
      <div id="schedule-view" class="data-table-wrap"></div>
      <button id="download-schedule-btn" class="btn btn-outline" style="margin-top:1rem" data-i18n="downloadSchedule">Download schedule (CSV)</button>
    </div>

    <div id="panel-data" class="tab-panel section-hidden">
      <h2 data-i18n="sampleDataTitle">Sample data downloads</h2>
      <p class="muted" data-i18n="sampleDataDesc">Download dummy data as CSV files. Use these for testing or as import templates.</p>
      <div class="card" style="display:flex;gap:0.75rem;flex-wrap:wrap;margin-top:1rem">
        <button class="btn btn-outline" data-download="students" data-i18n="downloadStudents">Download students (CSV)</button>
        <button class="btn btn-outline" data-download="grades" data-i18n="downloadGrades">Download grades (CSV)</button>
        <button class="btn btn-outline" data-download="schedules" data-i18n="downloadSchedule">Download schedule (CSV)</button>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/dashboard-teacher.js"></script>
</body>
</html>
