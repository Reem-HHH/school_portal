<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="api-base" content="">
  <title>Al Kharran Primary School</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="brand-bar">
        <img src="images/moe-logo.jpeg" class="moe-logo" alt="UAE Ministry of Education">
        <div class="school-brand">
          <a href="portal.html" class="logo" data-i18n="logo">Al Kharran Primary School</a>
          <p class="school-subtitle muted" data-i18n-subtitle>Al Kharran · Grades 1–4</p>
        </div>
      </div>
      <nav class="nav">
        <button data-section="home" class="nav-btn active" data-i18n="home">Home</button>
        <button data-section="schedules" class="nav-btn" data-i18n="schedules">Schedules</button>
        <button data-section="grades" class="nav-btn" data-i18n="grades">Grades</button>
        <a id="admin-link" href="admin.html" class="hidden" data-i18n="admin">Admin</a>
        <button id="logout-btn" data-i18n="logout">Logout</button>
        <button id="lang-toggle" class="btn btn-outline">AR</button>
      </nav>
    </div>
  </header>

  <main class="layout">
    <section id="section-home" class="app-section">
      <h1 id="welcome-heading">Welcome</h1>
      <p class="muted" id="role-line"></p>
    </section>

    <section id="section-schedules" class="app-section section-hidden">
      <h2 data-i18n="schedules">Schedules</h2>
      <div id="schedule-picker" class="card"></div>
      <div id="schedule-view"></div>
    </section>

    <section id="section-grades" class="app-section section-hidden">
      <h2 data-i18n="grades">Grades</h2>
      <div id="grades-picker" class="card"></div>
      <div id="grades-view"></div>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
