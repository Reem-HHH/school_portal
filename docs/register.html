<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="api-base" content="">
  <title>Register — Al Kharran Primary School</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-brand">
        <img src="images/moe-logo.png" class="moe-logo" alt="UAE Ministry of Education">
        <div class="school-brand">
          <h1 class="auth-school-title" data-i18n="logo">Al Kharran Primary School</h1>
          <p class="school-subtitle muted" data-i18n-subtitle>Al Kharran · Grades 1–4</p>
        </div>
      </div>
      <h1 data-i18n="register">Register</h1>
      <p class="muted mb-1">Parent or student accounts only.</p>

      <form id="register-form" class="card">
        <div class="form-row">
          <label for="fullName" data-i18n="name">Full name</label>
          <input id="fullName" type="text" required>
        </div>
        <div class="form-row">
          <label for="email" data-i18n="email">Email</label>
          <input id="email" type="email" required>
        </div>
        <div class="form-row">
          <label for="password" data-i18n="password">Password</label>
          <input id="password" type="password" required minlength="6">
        </div>
        <div class="form-row">
          <label for="role" data-i18n="role">Role</label>
          <select id="role">
            <option value="parent">Parent</option>
            <option value="student">Student</option>
          </select>
        </div>
        <div id="student-fields" class="form-row section-hidden">
          <label for="grade">Grade</label>
          <input id="grade" type="text" placeholder="e.g. Grade 1" data-i18n-placeholder="gradePlaceholder">
        </div>
        <div id="section-fields" class="form-row section-hidden">
          <label for="section" data-i18n="section">Section</label>
          <input id="section" type="text" placeholder="e.g. Section A" data-i18n-placeholder="sectionPlaceholder">
        </div>
        <button type="submit" class="btn" data-i18n="createAccount">Create account</button>
      </form>

      <p class="muted auth-links">
        <span data-i18n="hasAccount">Have an account?</span>
        <a href="index.html" data-i18n="login">Sign in</a>
      </p>
      <p class="auth-lang"><button id="lang-toggle" class="btn btn-outline">AR</button></p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/i18n.js"></script>
  <script>
    initLanguageToggle();
    redirectIfAuthed();

    const roleSelect = document.getElementById('role');
    const studentFields = document.getElementById('student-fields');
    const sectionFields = document.getElementById('section-fields');
    function toggleStudentFields() {
      const show = roleSelect.value === 'student';
      studentFields.classList.toggle('section-hidden', !show);
      sectionFields.classList.toggle('section-hidden', !show);
      document.getElementById('grade').required = show;
      document.getElementById('section').required = show;
    }
    roleSelect.addEventListener('change', toggleStudentFields);
    toggleStudentFields();

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const role = roleSelect.value;
        const payload = {
          fullName: document.getElementById('fullName').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
          role
        };
        if (role === 'student') {
          payload.grade = document.getElementById('grade').value;
          payload.section = document.getElementById('section').value;
        }
        const { dashboard } = await API.post('/api/auth/register', payload);
        window.location.href = dashboard || 'index.html';
      } catch (err) {
        showToast(err.message, 'error');
      }
    });
  </script>
</body>
</html>
