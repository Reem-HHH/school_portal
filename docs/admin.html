<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="api-base" content="">
  <title>Admin — School Portal</title>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script>window.location.replace('dashboard-admin.html');</script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="portal.html" class="logo">Admin</a>
      <nav class="nav">
        <a href="portal.html">Portal</a>
        <button id="logout-btn">Logout</button>
        <button id="lang-toggle">AR</button>
      </nav>
    </div>
  </header>

  <main class="layout">
    <div class="tabs">
      <button class="tab active" data-tab="uploads">Uploads</button>
      <button class="tab" data-tab="users">Users</button>
      <button class="tab" data-tab="logs">Activity log</button>
    </div>

    <div id="panel-uploads" class="tab-panel">
      <h2>Upload schedule</h2>
      <p class="muted">Image (JPG, PNG) or CSV/Excel with timetable data.</p>
      <form id="schedule-form" class="card form-grid form-grid-2" enctype="multipart/form-data">
        <div class="form-row">
          <label>Title</label>
          <input name="title" required placeholder="Week 1 timetable">
        </div>
        <div class="form-row">
          <label>Label (optional)</label>
          <input name="label" placeholder="Grade 5 · Section A">
        </div>
        <div class="form-row" style="grid-column:1/-1">
          <label>File</label>
          <input name="file" type="file" accept=".jpg,.jpeg,.png,.gif,.webp,.csv,.xlsx,.xls" required>
        </div>
        <div><button type="submit" class="btn">Upload schedule</button></div>
      </form>

      <h2>Upload grades</h2>
      <p class="muted">Image or Excel/CSV — first row must be column headers.</p>
      <form id="grades-form" class="card form-grid form-grid-2" enctype="multipart/form-data">
        <div class="form-row">
          <label>Title</label>
          <input name="title" required placeholder="Midterm results">
        </div>
        <div class="form-row">
          <label>Label (optional)</label>
          <input name="label" placeholder="Grade 5 · Section A">
        </div>
        <div class="form-row" style="grid-column:1/-1">
          <label>File</label>
          <input name="file" type="file" accept=".jpg,.jpeg,.png,.gif,.webp,.csv,.xlsx,.xls" required>
        </div>
        <div><button type="submit" class="btn">Upload grades</button></div>
      </form>

      <h2>Published content</h2>
      <div id="uploads-list" class="card"></div>
    </div>

    <div id="panel-users" class="tab-panel section-hidden">
      <form id="create-user-form" class="card form-grid form-grid-3">
        <div class="form-row">
          <label>Name</label>
          <input id="new-name" required>
        </div>
        <div class="form-row">
          <label>Email</label>
          <input id="new-email" type="email" required>
        </div>
        <div class="form-row">
          <label>Password</label>
          <input id="new-password" type="password" required minlength="6">
        </div>
        <div class="form-row">
          <label>Role</label>
          <select id="new-role">
            <option value="admin">Admin</option>
            <option value="teacher">Teacher</option>
            <option value="parent">Parent</option>
            <option value="student">Student</option>
          </select>
        </div>
        <div style="align-self:end"><button type="submit" class="btn">Create user</button></div>
      </form>

      <div class="data-table-wrap" style="margin-top:1rem">
        <table>
          <thead>
            <tr>
              <th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Joined</th><th></th>
            </tr>
          </thead>
          <tbody id="users-table"></tbody>
        </table>
      </div>
    </div>

    <div id="panel-logs" class="tab-panel section-hidden">
      <div class="data-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Time</th><th>User</th><th>Action</th><th>Details</th><th>IP</th>
            </tr>
          </thead>
          <tbody id="logs-table"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
