<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Set this to your Render URL when using GitHub Pages, e.g. https://school-portal-xxxx.onrender.com -->
  <meta name="api-base" content="">
  <title>Sign in — Al Kharran Primary School</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-brand">
        <img src="images/moe-logo.jpeg" class="moe-logo" alt="UAE Ministry of Education">
        <div class="school-brand">
          <h1 style="margin:0;font-size:1.125rem" data-i18n="logo">Al Kharran Primary School</h1>
          <p class="school-subtitle muted" data-i18n-subtitle>Al Kharran · Grades 1–4</p>
        </div>
      </div>
      <h1 data-i18n="login">Sign in</h1>
      <p class="muted" style="margin-bottom:0.5rem">admin@school.com / admin123</p>
      <p class="muted" style="margin-bottom:1.5rem" data-i18n="teacherLoginHint">Teacher login: teacher@school.com / teacher123</p>

      <form id="login-form" class="card">
        <div class="form-row">
          <label for="email" data-i18n="email">Email</label>
          <input id="email" type="email" required autocomplete="email">
        </div>
        <div class="form-row">
          <label for="password" data-i18n="password">Password</label>
          <input id="password" type="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn" data-i18n="signIn">Sign in</button>
      </form>

      <p class="muted" style="margin-top:1rem">
        <span data-i18n="noAccount">No account?</span>
        <a href="register.html" data-i18n="register">Register</a>
      </p>
      <p style="margin-top:0.75rem"><button id="lang-toggle" class="btn btn-outline">AR</button></p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/i18n.js"></script>
  <script>
    showBackendNotice();
    initLanguageToggle();
    redirectIfAuthed();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (location.hostname.endsWith('.github.io') && !API_BASE) {
        showToast('Connect your Render backend first (see notice above)', 'error');
        return;
      }
      try {
        const { dashboard } = await API.post('/api/auth/login', {
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        });
        window.location.href = dashboard || 'index.html';
      } catch (err) {
        showToast(err.message, 'error');
      }
    });
  </script>
</body>
</html>
