<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="api-base" content="">
  <title>Student Portal — School Portal</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="dashboard-student.html" class="logo" id="portal-title">Student Portal</a>
      <nav class="nav">
        <span id="user-label" class="muted"></span>
        <button id="logout-btn">Logout</button>
      </nav>
    </div>
  </header>

  <main class="layout">
    <div id="parent-picker" class="card section-hidden" style="margin-bottom:1rem">
      <label>Viewing child</label>
      <select id="child-select"></select>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="profile">Profile</button>
      <button class="tab" data-tab="schedule">Timetable</button>
      <button class="tab" data-tab="grades">My Grades</button>
    </div>

    <div id="panel-profile" class="tab-panel">
      <h2>Personal information</h2>
      <div id="profile-card" class="card"></div>
    </div>

    <div id="panel-schedule" class="tab-panel section-hidden">
      <h2>Timetable</h2>
      <div id="schedule-view" class="data-table-wrap"></div>
    </div>

    <div id="panel-grades" class="tab-panel section-hidden">
      <h2>Formative grades</h2>
      <div class="data-table-wrap">
        <table>
          <thead><tr><th>Subject</th><th>Type</th><th>Assessment</th><th>Score</th><th>Teacher</th></tr></thead>
          <tbody id="grades-table"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/dashboard-student.js"></script>
</body>
</html>
