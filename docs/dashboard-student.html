<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="api-base" content="">
  <title>Student Portal — Al Kharran Primary School</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="brand-bar">
        <img src="images/moe-logo.png" class="moe-logo" alt="UAE Ministry of Education">
        <div class="school-brand">
          <a href="dashboard-student.html" class="logo" id="portal-title" data-i18n="studentPortal">Student Portal</a>
          <p class="school-subtitle muted" data-i18n-subtitle>Al Kharran · Grades 1–4</p>
        </div>
      </div>
      <nav class="nav">
        <span id="user-label" class="muted"></span>
        <button id="lang-toggle" class="btn btn-outline">AR</button>
        <button id="logout-btn" data-i18n="logout">Logout</button>
      </nav>
    </div>
  </header>

  <main class="layout">
    <div id="parent-picker" class="card section-hidden" style="margin-bottom:1rem">
      <label data-i18n="viewingChild">Viewing child</label>
      <select id="child-select"></select>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="profile" data-i18n="tabProfile">Profile</button>
      <button class="tab" data-tab="schedule" data-i18n="tabTimetable">Timetable</button>
      <button class="tab" data-tab="grades" data-i18n="tabMyGrades">My Grades</button>
    </div>

    <div id="panel-profile" class="tab-panel">
      <h2 data-i18n="personalInfo">Personal information</h2>
      <div id="profile-card" class="card"></div>
    </div>

    <div id="panel-schedule" class="tab-panel section-hidden">
      <h2 data-i18n="tabTimetable">Timetable</h2>
      <div id="schedule-view" class="data-table-wrap"></div>
    </div>

    <div id="panel-grades" class="tab-panel section-hidden">
      <h2 data-i18n="formativeGrades">Formative grades</h2>
      <div class="data-table-wrap">
        <table>
          <thead><tr>
            <th data-i18n="subject">Subject</th>
            <th data-i18n="type">Type</th>
            <th data-i18n="assessment">Assessment</th>
            <th data-i18n="score">Score</th>
            <th data-i18n="teacher">Teacher</th>
          </tr></thead>
          <tbody id="grades-table"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/dashboard-student.js"></script>
</body>
</html>
